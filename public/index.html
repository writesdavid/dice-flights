<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roll the Dice — Which airline will actually deliver?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #242424;
      --text: #f0f0f0;
      --muted: #666;
      --muted2: #333;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 3.5rem 1rem 0.75rem;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .subhead { color: var(--muted); margin-top: 0.5rem; font-size: 1rem; }

    .roll-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 2rem 1rem 1.5rem;
    }

    #dice { font-size: 4.5rem; cursor: pointer; user-select: none; display: inline-block; }
    #dice.rolling { animation: roll 1.2s ease-out forwards; }

    @keyframes roll {
      0%   { transform: rotate(0deg) scale(1); }
      20%  { transform: rotate(180deg) scale(1.3); }
      40%  { transform: rotate(360deg) scale(0.9); }
      60%  { transform: rotate(520deg) scale(1.15); }
      80%  { transform: rotate(660deg) scale(1); }
      100% { transform: rotate(720deg) scale(1); }
    }

    #roll-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.8rem 2.5rem;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
    }
    #roll-btn:hover   { background: #4f52d4; }
    #roll-btn:active  { transform: scale(0.97); }
    #roll-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #status { color: var(--muted); font-size: 0.875rem; min-height: 1.2em; }

    #results {
      width: 100%;
      max-width: 740px;
      padding: 0 1rem 2rem;
      display: none;
      flex-direction: column;
      gap: 0.55rem;
    }
    #results.visible { display: flex; }

    .airline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(6px);
      animation: fadeUp 0.3s ease forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem 0.85rem;
    }

    .rank { font-size: 1.3rem; font-weight: 800; width: 1.8rem; text-align: center; flex-shrink: 0; }
    .rank.good { color: var(--green); }
    .rank.ok   { color: var(--yellow); }
    .rank.bad  { color: var(--red); }

    .airline-name-wrap { flex: 1; }
    .airline-name { font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .iata { color: var(--muted); font-weight: 400; font-size: 0.8rem; }

    .trend-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
    .trend-badge.up   { color: var(--green);  background: rgba(34,197,94,0.12); }
    .trend-badge.down { color: var(--red);    background: rgba(239,68,68,0.12); }
    .trend-badge.flat { color: var(--muted);  background: rgba(100,100,100,0.1); }

    .card-score { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
    .card-score.good { color: var(--green); }
    .card-score.ok   { color: var(--yellow); }
    .card-score.bad  { color: var(--red); }

    .signal-sections {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .sig-section {
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .sig-section:nth-child(odd) { border-right: 1px solid var(--border); }
    .sig-section:last-child:nth-child(odd) { grid-column: 1 / -1; border-right: none; }

    .sig-heading {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .sig-bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }

    .bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.55s ease; }
    .bar-fill.good { background: var(--green); }
    .bar-fill.ok   { background: var(--yellow); }
    .bar-fill.bad  { background: var(--red); }
    .bar-fill.null { background: var(--muted2); width: 8% !important; }

    .bar-val { font-size: 0.72rem; font-weight: 700; width: 2.2rem; text-align: right; flex-shrink: 0; }
    .bar-val.good { color: var(--green); }
    .bar-val.ok   { color: var(--yellow); }
    .bar-val.bad  { color: var(--red); }
    .bar-val.null { color: var(--muted); }

    .sig-detail { font-size: 0.68rem; color: var(--muted); line-height: 1.4; }

    footer {
      margin-top: auto;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.77rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <header>
    <h1>Roll the dice.</h1>
    <p class="subhead">Which US airline will actually deliver when you fly?</p>
  </header>

  <div class="roll-area">
    <div id="dice">&#9861;</div>
    <button id="roll-btn">Roll</button>
    <div id="status"></div>
  </div>

  <div id="results"></div>

  <footer>
    Four signals: <span id="bts-period">historical</span> DOT performance &middot; FAA hub delays &middot; hub weather forecast &middot; news sentiment.<br>
    No API keys. No ads. <span id="last-updated"></span>
  </footer>

  <script>
    const DICE = ['&#9856;','&#9857;','&#9858;','&#9859;','&#9860;','&#9861;'];
    const dice = document.getElementById('dice');
    const btn = document.getElementById('roll-btn');
    const statusEl = document.getElementById('status');
    const results = document.getElementById('results');

    function rankCls(rank) { return rank <= 2 ? 'good' : rank <= 5 ? 'ok' : 'bad'; }
    function scoreCls(s) {
      if (s === null || s === undefined) return 'null';
      return s >= 70 ? 'good' : s >= 52 ? 'ok' : 'bad';
    }

    function sigSection(heading, sig) {
      const pct = sig?.score ?? 0;
      const cls = scoreCls(sig?.score);
      const valStr = sig?.score != null ? sig.score : '—';
      return `
        <div class="sig-section">
          <div class="sig-heading">${heading}</div>
          <div class="sig-bar-row">
            <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
            <div class="bar-val ${cls}">${valStr}</div>
          </div>
          <div class="sig-detail">${sig?.detail ?? 'No data'}</div>
        </div>`;
    }

    function trendBadge(delta) {
      if (delta == null) return '';
      if (delta > 1.5)  return `<span class="trend-badge up">↑ improving</span>`;
      if (delta < -1.5) return `<span class="trend-badge down">↓ declining</span>`;
      return `<span class="trend-badge flat">→ stable</span>`;
    }

    function renderCard(a, i) {
      const rCls = rankCls(a.rank);
      const sCls = scoreCls(a.score);
      const delta = a.signals.bts?.raw?.trendDelta;

      const card = document.createElement('div');
      card.className = 'airline-card';
      card.style.animationDelay = `${i * 55}ms`;

      card.innerHTML = `
        <div class="card-top">
          <div class="rank ${rCls}">${a.rank}</div>
          <div class="airline-name-wrap">
            <div class="airline-name">
              ${a.name}
              <span class="iata">${a.iata}</span>
              ${trendBadge(delta)}
            </div>
          </div>
          <div class="card-score ${sCls}">${a.score ?? '—'}</div>
        </div>
        <div class="signal-sections">
          ${sigSection('Track record', a.signals.bts)}
          ${sigSection('Right now', a.signals.faa)}
          ${sigSection('This week', a.signals.weather)}
          ${sigSection('In the news', a.signals.news)}
        </div>`;

      return card;
    }

    async function rollDice() {
      btn.disabled = true;
      statusEl.textContent = '';

      dice.classList.remove('rolling');
      void dice.offsetWidth;
      dice.classList.add('rolling');

      const shuffle = setInterval(() => {
        dice.innerHTML = DICE[Math.floor(Math.random() * DICE.length)];
      }, 100);

      let data;
      try {
        const res = await fetch('/api/airlines');
        if (res.status === 503) {
          clearInterval(shuffle);
          dice.classList.remove('rolling');
          statusEl.textContent = 'Loading data — try again in a moment.';
          btn.disabled = false;
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        clearInterval(shuffle);
        dice.classList.remove('rolling');
        statusEl.textContent = 'Could not reach server.';
        btn.disabled = false;
        return;
      }

      await new Promise(r => setTimeout(r, 1200));

      clearInterval(shuffle);
      dice.classList.remove('rolling');
      dice.innerHTML = DICE[Math.floor(Math.random() * DICE.length)];

      results.innerHTML = '';
      data.airlines.forEach((a, i) => results.appendChild(renderCard(a, i)));
      results.classList.add('visible');

      if (data.btsPeriod) document.getElementById('bts-period').textContent = data.btsPeriod;
      if (data.lastFetched) {
        document.getElementById('last-updated').textContent =
          `Signals refreshed: ${new Date(data.lastFetched).toLocaleString()}`;
      }

      btn.disabled = false;
    }

    btn.addEventListener('click', rollDice);
    dice.addEventListener('click', rollDice);
  </script>
</body>
</html>
