<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roll the Dice — US Airline Delays</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --accent: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    header p {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 1.1rem;
    }

    .roll-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem 1rem;
    }

    #dice {
      font-size: 5rem;
      cursor: pointer;
      user-select: none;
      display: inline-block;
      transition: transform 0.1s;
    }

    #dice.rolling {
      animation: roll 1.2s ease-out forwards;
    }

    @keyframes roll {
      0%   { transform: rotate(0deg) scale(1); }
      15%  { transform: rotate(120deg) scale(1.3); }
      30%  { transform: rotate(240deg) scale(0.9); }
      45%  { transform: rotate(360deg) scale(1.2); }
      60%  { transform: rotate(480deg) scale(1); }
      75%  { transform: rotate(540deg) scale(1.1); }
      90%  { transform: rotate(600deg) scale(1); }
      100% { transform: rotate(720deg) scale(1); }
    }

    #roll-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.85rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
    }

    #roll-btn:hover { background: #4f52d4; }
    #roll-btn:active { transform: scale(0.97); }
    #roll-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    #results {
      width: 100%;
      max-width: 680px;
      padding: 0 1rem 1rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }

    #results.visible { display: flex; }

    .airline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 2rem 1fr auto;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.3s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .rank {
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
    }

    .rank.good  { color: var(--green); }
    .rank.ok    { color: var(--yellow); }
    .rank.bad   { color: var(--red); }

    .airline-info { display: flex; flex-direction: column; gap: 0.3rem; }

    .airline-name {
      font-weight: 700;
      font-size: 1rem;
    }

    .airline-meta {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .score-bar-wrap {
      width: 90px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .score-label {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .score-bar-bg {
      width: 90px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .score-bar-fill.good  { background: var(--green); }
    .score-bar-fill.ok    { background: var(--yellow); }
    .score-bar-fill.bad   { background: var(--red); }

    footer {
      margin-top: auto;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    #last-updated { font-style: italic; }
  </style>
</head>
<body>

  <header>
    <h1>Roll the dice.</h1>
    <p>Which US airline is actually safe right now?</p>
  </header>

  <div class="roll-area">
    <div id="dice">&#9861;</div>
    <button id="roll-btn">Roll</button>
    <div id="status"></div>
  </div>

  <div id="results"></div>

  <footer>
    Data refreshed every 12 hours via AviationStack. <span id="last-updated"></span>
  </footer>

  <script>
    const DICE_FACES = ['&#9856;', '&#9857;', '&#9858;', '&#9859;', '&#9860;', '&#9861;'];
    const dice = document.getElementById('dice');
    const btn = document.getElementById('roll-btn');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const lastUpdatedEl = document.getElementById('last-updated');

    function rankClass(rank) {
      if (rank <= 2) return 'good';
      if (rank <= 5) return 'ok';
      return 'bad';
    }

    function fmt(val, decimals = 1) {
      return val != null ? val.toFixed(decimals) : '—';
    }

    function renderAirlines(airlines, lastFetched) {
      results.innerHTML = '';

      airlines.forEach((a, i) => {
        const cls = rankClass(a.rank);
        const scoreNorm = a.score != null ? Math.min(100, Math.max(0, a.score)) : 0;

        const card = document.createElement('div');
        card.className = 'airline-card';
        card.style.animationDelay = `${i * 60}ms`;

        card.innerHTML = `
          <div class="rank ${cls}">${a.rank}</div>
          <div class="airline-info">
            <div class="airline-name">${a.name} <span style="color:var(--muted);font-weight:400;font-size:0.85em">${a.iata}</span></div>
            <div class="airline-meta">
              <span>On-time: <strong>${a.on_time_pct != null ? fmt(a.on_time_pct) + '%' : '—'}</strong></span>
              <span>Avg delay: <strong>${a.avg_delay_mins != null ? fmt(a.avg_delay_mins) + ' min' : '—'}</strong></span>
              <span>Flights: <strong>${a.total > 0 ? a.total : '—'}</strong></span>
            </div>
          </div>
          <div class="score-bar-wrap">
            <div class="score-label">${a.score != null ? fmt(a.score) : '—'}</div>
            <div class="score-bar-bg">
              <div class="score-bar-fill ${cls}" style="width:${scoreNorm}%"></div>
            </div>
          </div>
        `;

        results.appendChild(card);
      });

      results.classList.add('visible');

      if (lastFetched) {
        const d = new Date(lastFetched);
        lastUpdatedEl.textContent = `Last updated: ${d.toLocaleString()}`;
      }
    }

    async function rollDice() {
      btn.disabled = true;
      status.textContent = '';

      // Animate dice
      dice.classList.remove('rolling');
      void dice.offsetWidth; // reflow to restart animation
      dice.classList.add('rolling');

      // Shuffle face during animation
      const shuffleInterval = setInterval(() => {
        dice.innerHTML = DICE_FACES[Math.floor(Math.random() * DICE_FACES.length)];
      }, 100);

      // Fetch data
      let data;
      try {
        const res = await fetch('/api/airlines');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        clearInterval(shuffleInterval);
        dice.classList.remove('rolling');
        status.textContent = 'Could not load data. Is the server running?';
        btn.disabled = false;
        return;
      }

      // Wait for animation to finish (1.2s total)
      await new Promise(resolve => setTimeout(resolve, 1200));

      clearInterval(shuffleInterval);
      dice.classList.remove('rolling');
      dice.innerHTML = DICE_FACES[Math.floor(Math.random() * DICE_FACES.length)];

      renderAirlines(data.airlines, data.lastFetched);
      btn.disabled = false;
    }

    btn.addEventListener('click', rollDice);
    dice.addEventListener('click', rollDice);
  </script>
</body>
</html>
