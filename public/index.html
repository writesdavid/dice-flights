<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Flights — Which airline will actually deliver?</title>
  <meta name="author" content="David Hamilton" />
  <meta property="og:title" content="Dice Flights" />
  <meta property="og:description" content="Loyalty to your family. Not your airline." />
  <meta name="twitter:creator" content="@writesdavid" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #09090b;
      --surface: #111113;
      --surface2:#18181c;
      --border:  #232328;
      --text:    #f1f1f3;
      --muted:   #56566a;
      --muted2:  #25252e;
      --green:   #22c55e;
      --yellow:  #eab308;
      --red:     #ef4444;
      --accent:  #6366f1;
      --gold:    #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Hero ───────────────────────────────────────────────────────── */
    #hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      width: 100%;
      justify-content: center;
      padding-bottom: 4rem;
      transition: flex 0.5s ease;
    }
    #hero.settled { flex: 0; padding-bottom: 0; }

    header { text-align: center; padding: 0 1.5rem 0.25rem; }

    h1 {
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 1;
    }
    .tagline {
      margin-top: 0.6rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    /* ── Roll area ──────────────────────────────────────────────────── */
    .roll-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 2rem 1rem 1rem;
    }

    #dice {
      font-size: 4.5rem;
      cursor: pointer;
      user-select: none;
      display: inline-block;
      line-height: 1;
      transition: filter 0.15s;
    }
    #dice:hover { filter: drop-shadow(0 0 12px rgba(99,102,241,0.5)); }
    #dice.rolling { animation: roll 1.2s ease-out forwards; }
    @keyframes roll {
      0%   { transform: rotate(0deg)   scale(1); }
      20%  { transform: rotate(180deg) scale(1.3); }
      40%  { transform: rotate(360deg) scale(0.9); }
      60%  { transform: rotate(520deg) scale(1.15); }
      80%  { transform: rotate(660deg) scale(1); }
      100% { transform: rotate(720deg) scale(1); }
    }

    #roll-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.85rem 2.75rem;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
    }
    #roll-btn:hover   { background: #4f52d4; box-shadow: 0 0 22px rgba(99,102,241,0.4); }
    #roll-btn:active  { transform: scale(0.97); }
    #roll-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    /* ── Loading ────────────────────────────────────────────────────── */
    #loading { display: none; flex-direction: column; align-items: center; gap: 0.75rem; padding: 0.25rem 0; }
    #loading.visible { display: flex; }

    .loading-phrase {
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.3em;
      animation: phraseFade 0.4s ease;
    }
    @keyframes phraseFade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .loading-dots { display: flex; gap: 5px; }
    .loading-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    #status { color: var(--red); font-size: 0.875rem; min-height: 1.2em; text-align: center; }

    /* ── Summary bar chart ──────────────────────────────────────────── */
    #summary { display: none; width: 100%; max-width: 640px; padding: 0 1rem 0.75rem; }
    #summary.visible { display: block; }

    .summary-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.32rem;
      opacity: 0;
      animation: fadeIn 0.2s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .sum-rank { font-size: 0.68rem; font-weight: 700; width: 1.1rem; text-align: right; flex-shrink: 0; color: var(--muted); }
    .sum-rank.good { color: var(--green); }
    .sum-rank.ok   { color: var(--yellow); }
    .sum-rank.bad  { color: var(--red); }

    .sum-name { font-size: 0.78rem; font-weight: 600; width: 5.5rem; flex-shrink: 0; white-space: nowrap; }

    .sum-bar-bg { flex: 1; height: 5px; background: var(--muted2); border-radius: 3px; overflow: hidden; }
    .sum-bar-fill {
      height: 100%; border-radius: 3px; width: 0;
      transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sum-bar-fill.good { background: var(--green); }
    .sum-bar-fill.ok   { background: var(--yellow); }
    .sum-bar-fill.bad  { background: var(--red); }

    .sum-score { font-size: 0.72rem; font-weight: 700; width: 1.9rem; text-align: right; flex-shrink: 0; }
    .sum-score.good { color: var(--green); }
    .sum-score.ok   { color: var(--yellow); }
    .sum-score.bad  { color: var(--red); }

    /* ── Results ────────────────────────────────────────────────────── */
    #results {
      width: 100%;
      max-width: 640px;
      padding: 0.25rem 1rem 2.5rem;
      display: none;
      flex-direction: column;
      gap: 0.55rem;
    }
    #results.visible { display: flex; }

    /* ── Airline card ───────────────────────────────────────────────── */
    .airline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.35s ease forwards;
    }
    .airline-card.winner {
      border-color: rgba(245,158,11,0.45);
      box-shadow: 0 0 28px rgba(245,158,11,0.07);
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card-top {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1.2rem;
    }

    .rank-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 2rem;
      flex-shrink: 0;
    }
    .rank-num { font-size: 1.55rem; font-weight: 800; line-height: 1; }
    .rank-num.good { color: var(--green); }
    .rank-num.ok   { color: var(--yellow); }
    .rank-num.bad  { color: var(--red); }
    .winner-label { font-size: 0.55rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; margin-top: 0.12rem; }

    .airline-info { flex: 1; min-width: 0; }
    .airline-name {
      font-weight: 700;
      font-size: 0.97rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .iata {
      font-size: 0.7rem; font-weight: 500; color: var(--muted);
      background: var(--surface2); padding: 0.1rem 0.3rem; border-radius: 3px;
    }
    .trend-badge {
      font-size: 0.6rem; font-weight: 700;
      padding: 0.1rem 0.35rem; border-radius: 4px;
    }
    .trend-badge.up   { color: var(--green);  background: rgba(34,197,94,0.1); }
    .trend-badge.down { color: var(--red);    background: rgba(239,68,68,0.1); }
    .trend-badge.flat { color: var(--muted);  background: rgba(100,100,100,0.08); }

    .key-stats { margin-top: 0.35rem; font-size: 0.7rem; color: var(--muted); }
    .key-stats strong { font-weight: 600; }
    .key-stats .hi  { color: var(--green); }
    .key-stats .lo  { color: var(--yellow); }
    .key-stats .bad { color: var(--red); }

    .card-score { font-size: 2.1rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; flex-shrink: 0; }
    .card-score.good { color: var(--green); }
    .card-score.ok   { color: var(--yellow); }
    .card-score.bad  { color: var(--red); }
    .card-score.null { color: var(--muted); }

    /* ── Weighted signal bars ────────────────────────────────────────
       Width  = signal weight (how much it counts)
       Height = signal score  (how well this airline does on it)
       Empty space above = room left — context built in
    ─────────────────────────────────────────────────────────────── */
    .signal-bars {
      display: flex;
      height: 56px;
      border-top: 1px solid var(--border);
    }

    .sbar {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border-right: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      cursor: default;
    }
    .sbar:last-child { border-right: none; }

    /* widths by weight */
    .sbar.bts     { flex: 50; }
    .sbar.faa     { flex: 15; }
    .sbar.weather { flex: 15; }
    .sbar.news    { flex: 20; }

    .sbar-fill {
      width: 100%;
      height: 0;
      transition: height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sbar-fill.good { background: rgba(34,197,94,0.55); }
    .sbar-fill.ok   { background: rgba(234,179,8,0.5); }
    .sbar-fill.bad  { background: rgba(239,68,68,0.45); }
    .sbar-fill.null { background: var(--muted2); height: 10% !important; }

    .sbar-label {
      position: absolute;
      top: 5px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.52rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    footer {
      margin-top: auto;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div id="hero">
    <header>
      <h1>Roll the dice.</h1>
      <p class="tagline">Loyalty to your family. Not your airline.</p>
    </header>

    <div class="roll-area">
      <div id="dice">&#9861;</div>
      <button id="roll-btn">Roll</button>
      <div id="loading">
        <div class="loading-phrase" id="loading-phrase"></div>
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
      <div id="status"></div>
    </div>
  </div>

  <div id="summary"></div>
  <div id="results"></div>

  <footer>
    Track record (50%) · FAA delays (15%) · Hub weather (15%) · News (20%)<br>
    No ads. No affiliates. <span id="last-updated"></span><br>
    Built by <a href="https://github.com/writesdavid/dice-flights" target="_blank" rel="noopener">David Hamilton</a> · <a href="https://writesdavid.substack.com" target="_blank" rel="noopener">writesdavid.substack.com</a>
  </footer>

  <script>
    const DICE_FACES = ['&#9856;','&#9857;','&#9858;','&#9859;','&#9860;','&#9861;'];
    const LOADING_PHRASES = [
      'Checking the skies...',
      'Reading the news...',
      'Asking the FAA...',
      'Counting lost bags...',
      'Scanning hub delays...',
      'Crunching the numbers...',
      'Looking at the forecast...',
    ];

    const diceEl    = document.getElementById('dice');
    const btn       = document.getElementById('roll-btn');
    const statusEl  = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const resultsEl = document.getElementById('results');
    const heroEl    = document.getElementById('hero');
    const loadingEl = document.getElementById('loading');
    const phraseEl  = document.getElementById('loading-phrase');

    function cls(v) {
      if (v == null) return 'null';
      return v >= 70 ? 'good' : v >= 52 ? 'ok' : 'bad';
    }
    function rankCls(r) { return r <= 2 ? 'good' : r <= 5 ? 'ok' : 'bad'; }

    // ── Summary bar chart ─────────────────────────────────────────────
    function renderSummary(airlines) {
      summaryEl.innerHTML = '';
      airlines.forEach((a, i) => {
        const c = cls(a.score);
        const row = document.createElement('div');
        row.className = 'summary-row';
        row.style.animationDelay = `${i * 40}ms`;
        row.innerHTML = `
          <div class="sum-rank ${rankCls(a.rank)}">${a.rank}</div>
          <div class="sum-name">${a.name}</div>
          <div class="sum-bar-bg">
            <div class="sum-bar-fill ${c}" data-w="${a.score ?? 0}"></div>
          </div>
          <div class="sum-score ${c}">${a.score ?? '—'}</div>`;
        summaryEl.appendChild(row);
      });
      summaryEl.classList.add('visible');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        summaryEl.querySelectorAll('.sum-bar-fill').forEach(el => {
          el.style.width = `${el.dataset.w}%`;
        });
      }));
    }

    // ── Weighted signal bars ──────────────────────────────────────────
    // Width = signal weight. Height of fill = signal score (0–100% of bar height).
    // Empty space above each column shows how far from perfect — context built in.
    function signalBars(bts, faa, weather, news) {
      const signals = [
        { key: 'bts',     label: 'Track record', sig: bts },
        { key: 'faa',     label: 'FAA',          sig: faa },
        { key: 'weather', label: 'Weather',       sig: weather },
        { key: 'news',    label: 'News',          sig: news },
      ];
      return signals.map(({ key, label, sig }) => {
        const s = sig?.score;
        const c = cls(s);
        const h = s != null ? s : null;
        return `<div class="sbar ${key}" title="${label}: ${s ?? 'no data'}">
          <div class="sbar-label">${label}</div>
          <div class="sbar-fill ${c}" data-h="${h ?? 0}" style="height:0%"></div>
        </div>`;
      }).join('');
    }

    // ── Airline card ──────────────────────────────────────────────────
    function renderCard(a, i) {
      const rc = rankCls(a.rank);
      const sc = cls(a.score);
      const isWinner = a.rank === 1;
      const delta = a.signals.bts?.raw?.trendDelta;
      const raw = a.signals.bts?.raw;

      let badge = '';
      if (delta != null) {
        if (delta > 1.5)       badge = `<span class="trend-badge up">↑ improving</span>`;
        else if (delta < -1.5) badge = `<span class="trend-badge down">↓ declining</span>`;
        else                   badge = `<span class="trend-badge flat">→ stable</span>`;
      }

      let stats = '';
      if (raw) {
        const ot = raw.avgOnTimePct != null ? Math.round(raw.avgOnTimePct * 10) / 10 : null;
        const ca = raw.avgCancelPct != null ? Math.round(raw.avgCancelPct * 10) / 10 : null;
        const otCls = ot == null ? '' : ot >= 82 ? 'hi' : ot >= 68 ? '' : 'lo bad';
        const caCls = ca == null ? '' : ca <= 1.2 ? 'hi' : ca <= 2 ? '' : 'bad';
        const parts = [];
        if (ot != null) parts.push(`<strong class="${otCls}">${ot}%</strong> on-time`);
        if (ca != null) parts.push(`<strong class="${caCls}">${ca}%</strong> cancelled`);
        if (parts.length) stats = `<div class="key-stats">${parts.join(' &nbsp;·&nbsp; ')}</div>`;
      }

      const card = document.createElement('div');
      card.className = `airline-card${isWinner ? ' winner' : ''}`;
      card.style.animationDelay = `${i * 55}ms`;

      card.innerHTML = `
        <div class="card-top">
          <div class="rank-block">
            <div class="rank-num ${rc}">${a.rank}</div>
            ${isWinner ? '<div class="winner-label">BEST BET</div>' : ''}
          </div>
          <div class="airline-info">
            <div class="airline-name">
              ${a.name} <span class="iata">${a.iata}</span> ${badge}
            </div>
            ${stats}
          </div>
          <div class="card-score ${sc}">${a.score ?? '—'}</div>
        </div>
        <div class="signal-bars">
          ${signalBars(a.signals.bts, a.signals.faa, a.signals.weather, a.signals.news)}
        </div>`;

      return card;
    }

    // ── Roll ──────────────────────────────────────────────────────────
    async function rollDice() {
      btn.disabled = true;
      statusEl.textContent = '';

      diceEl.classList.remove('rolling');
      void diceEl.offsetWidth;
      diceEl.classList.add('rolling');

      let phraseIdx = 0;
      phraseEl.textContent = LOADING_PHRASES[phraseIdx];
      loadingEl.classList.add('visible');
      const phraseInterval = setInterval(() => {
        phraseIdx = (phraseIdx + 1) % LOADING_PHRASES.length;
        phraseEl.style.animation = 'none';
        void phraseEl.offsetWidth;
        phraseEl.style.animation = '';
        phraseEl.textContent = LOADING_PHRASES[phraseIdx];
      }, 900);

      const shuffle = setInterval(() => {
        diceEl.innerHTML = DICE_FACES[Math.floor(Math.random() * DICE_FACES.length)];
      }, 100);

      let data;
      try {
        const res = await fetch('/api/airlines');
        if (res.status === 503) {
          clearInterval(shuffle); clearInterval(phraseInterval);
          loadingEl.classList.remove('visible');
          diceEl.classList.remove('rolling');
          statusEl.textContent = 'Loading data — try again in a moment.';
          btn.disabled = false;
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (e) {
        clearInterval(shuffle); clearInterval(phraseInterval);
        loadingEl.classList.remove('visible');
        diceEl.classList.remove('rolling');
        statusEl.textContent = 'Could not reach server.';
        btn.disabled = false;
        return;
      }

      await new Promise(r => setTimeout(r, 1200));
      clearInterval(shuffle); clearInterval(phraseInterval);
      loadingEl.classList.remove('visible');
      diceEl.classList.remove('rolling');
      diceEl.innerHTML = DICE_FACES[Math.floor(Math.random() * DICE_FACES.length)];

      heroEl.classList.add('settled');
      summaryEl.classList.remove('visible');
      resultsEl.innerHTML = '';

      renderSummary(data.airlines);
      data.airlines.forEach((a, i) => resultsEl.appendChild(renderCard(a, i)));
      resultsEl.classList.add('visible');

      // Animate signal bar fills after paint
      requestAnimationFrame(() => requestAnimationFrame(() => {
        resultsEl.querySelectorAll('.sbar-fill').forEach(el => {
          el.style.height = `${el.dataset.h}%`;
        });
      }));

      if (data.lastFetched) {
        document.getElementById('last-updated').textContent =
          `Updated ${new Date(data.lastFetched).toLocaleTimeString()}.`;
      }

      btn.disabled = false;
    }

    btn.addEventListener('click', rollDice);
    diceEl.addEventListener('click', rollDice);
  </script>
</body>
</html>
